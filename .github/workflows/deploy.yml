name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 22 (.nvmrc) — Corepack으로 pnpm 고정 (pnpm/action-setup PATH 이슈·exit 127 회피)
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (next-on-pages)
        run: pnpm run pages:build

      # name = "ably-link-sever2" (wrangler.toml, package.json)
      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy .vercel/output/static --project-name ably-link-sever2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
