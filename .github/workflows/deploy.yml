name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # package.json 의 packageManager(pnpm) 때문에 setup-node v5 가 기본으로 pnpm 캐시를
      # 켜며, 이 시점에는 pnpm 이 없어 실패함 → 자동 캐시만 끔 (Corepack 이후에 pnpm 생김)
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      # Node 번들 Corepack으로 pnpm 활성화 (pnpm/action-setup 의 Node 20 경고 회피)
      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (next-on-pages)
        run: pnpm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Verify build output
        run: test -d .vercel/output/static

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy .vercel/output/static --project-name ably-link-sever2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
