# Cron Worker — abiy-link-sever2 전용 (원본 ably-link-server D1·Worker와 분리)
# 배포: cd workers/daily-reset && npx wrangler deploy
# 루트 wrangler.toml 과 동일한 이 저장소 전용 D1 UUID만 사용하세요.

name = "ably-link-sever2-daily-reset"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "ably-link-sever2-db"
database_id = "181c7d3f-6a3f-44b2-9105-d6ca09f3999d"

[triggers]
crons = ["0 15 * * *"]
